kind = "web"
previewPath = "/"
title = "Sistem Kamar Bedah"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/"]

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/kamar-bedah run dev"

[services.production]
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/kamar-bedah", "run", "build"]
